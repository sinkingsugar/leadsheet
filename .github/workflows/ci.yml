name: ci
on:
  push:
    branches: [main]
  pull_request:

jobs:
  checks:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      # Nightly: edition-2024 toolchain in use locally, and rustfmt.toml
      # relies on unstable options.
      - uses: dtolnay/rust-toolchain@nightly
        with:
          components: rustfmt, clippy
          targets: wasm32-unknown-unknown
      - run: cargo fmt --check
      - run: cargo clippy --all-targets -- -D warnings
      - run: cargo test
      # Host enablement: the core stays wasm-buildable.
      - run: cargo build -p leadsheet-core --target wasm32-unknown-unknown
